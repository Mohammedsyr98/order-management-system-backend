name: CI

on:
  pull_request:
    branches:
      - main
      - staging
  push:
    branches:
      - main
      - staging

permissions:
  contents: read

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run type-check

      - name: Build
        run: npm run build

  integration-tests:
    name: integration-tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: integration-tests-shared-database
      cancel-in-progress: false
    env:
      DATABASE_URL_TEST: ${{ secrets.DATABASE_URL_TEST }}
      DATABASE_URL: ${{ secrets.DATABASE_URL_TEST }}

    steps:
      - name: Validate test database secret
        shell: bash
        run: |
          if [ -z "$DATABASE_URL_TEST" ]; then
            echo "::error::DATABASE_URL_TEST repository secret is not configured."
            exit 1
          fi

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
